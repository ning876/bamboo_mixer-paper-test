<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bamboo-Mixer 电解液配方平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .status-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-item.loading {
            color: #ffc107;
        }

        .status-item.ready {
            color: #4caf50;
        }

        .status-item.error {
            color: #f44336;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.3rem;
            color: #00d9ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #00d9ff;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        select option {
            background: #fffec8;
            color: #333;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 0 3px rgba(0,217,255,0.2);
        }

        .component-section {
            margin-top: 20px;
        }

        .component-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .component-header h4 {
            color: #00d9ff;
            font-size: 1rem;
        }

        .add-btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: #00b8d9;
            transform: translateY(-2px);
        }

        .component-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .component-item {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
        }

        .component-item select {
            flex: 2;
        }

        .component-item input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
        }

        .component-item .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .component-item .remove-btn:hover {
            background: #ff3344;
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d9 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-panel {
            margin-top: 30px;
        }

        .result-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .result-card h4 {
            color: #00d9ff;
            margin-bottom: 15px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00d9ff;
        }

        .stat-label {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .formula-detail {
            margin-top: 15px;
        }

        .formula-detail h5 {
            color: #fff;
            margin: 10px 0;
        }

        .formula-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin: 5px 0;
        }

        .formula-item .name {
            color: #00d9ff;
            font-weight: 600;
        }

        .formula-item .ratio {
            color: #888;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: #00d9ff;
            color: #1a1a2e;
            font-weight: 600;
        }

        .tab:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .loading-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0,217,255,0.2);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00d9ff;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .preset-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .preset-btn:hover {
            background: rgba(0,217,255,0.2);
            border-color: #00d9ff;
        }

        .preset-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .api-info {
            background: rgba(0,217,255,0.1);
            border: 1px solid rgba(0,217,255,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .api-info code {
            color: #00d9ff;
            font-family: monospace;
        }

        .vocab-section {
            margin-top: 15px;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .vocab-item {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.8rem;
        }

        .vocab-item .vocab-name {
            color: #00d9ff;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
        }

        footer a {
            color: #00d9ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bamboo-Mixer</h1>
            <p class="subtitle">电解液配方预测与生成统一框架 | ByteDance Seed Team</p>
        </header>

        <div class="status-bar">
            <div class="status-item" id="apiStatus">
                <span id="statusText">检查API连接...</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="predict">配方预测</button>
            <button class="tab" data-tab="generate">配方生成</button>
            <button class="tab" data-tab="vocab">词汇表</button>
        </div>

        <!-- 配方预测 Tab -->
        <div class="tab-content active" id="predict">
            <div class="main-content">
                <div class="panel">
                    <h3 class="panel-title">输入电解液配方</h3>

                    <div class="form-group">
                        <label>温度 (°C)</label>
                        <input type="number" id="temp" value="25" min="-40" max="100">
                    </div>

                    <div class="form-group">
                        <label>浓度 (M)</label>
                        <input type="number" id="conc" value="1.0" min="0" max="5" step="0.1">
                    </div>

                    <div class="preset-btns">
                        <button class="preset-btn" onclick="loadPreset('standard')">标准配方</button>
                        <button class="preset-btn" onclick="loadPreset('highconc')">高浓度配方</button>
                        <button class="preset-btn" onclick="loadPreset('lp30')">LP30</button>
                    </div>

                    <div class="component-section">
                        <div class="component-header">
                            <h4>溶剂 (最多12种)</h4>
                            <button class="add-btn" onclick="addSolvent()">+ 添加溶剂</button>
                        </div>
                        <div class="component-list" id="solventsList"></div>
                    </div>

                    <div class="component-section">
                        <div class="component-header">
                            <h4>盐</h4>
                            <button class="add-btn" onclick="addSalt()">+ 添加盐</button>
                        </div>
                        <div class="component-list" id="saltsList"></div>
                    </div>

                    <button class="submit-btn" id="predictBtn" onclick="predictFormula()">
                        预测属性
                    </button>
                </div>

                <div class="panel">
                    <h3 class="panel-title">预测结果</h3>
                    <div id="predictResult">
                        <p style="color: #666; text-align: center; padding: 50px;">
                            输入配方后点击"预测属性"获取结果
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 配方生成 Tab -->
        <div class="tab-content" id="generate">
            <div class="main-content">
                <div class="panel">
                    <h3 class="panel-title">输入目标属性</h3>

                    <div class="form-group">
                        <label>目标电导率 (mS/cm)</label>
                        <input type="number" id="targetCond" value="10" min="0.1" max="100" step="0.1">
                        <small style="color: #666; margin-top: 5px; display: block;">
                            典型值: 1-20 mS/cm
                        </small>
                    </div>

                    <div class="form-group">
                        <label>目标阴离子比 (0-1)</label>
                        <input type="number" id="targetAnion" value="0.3" min="0" max="1" step="0.01">
                    </div>

                    <div class="form-group">
                        <label>温度 (°C)</label>
                        <input type="number" id="genTemp" value="25" min="-40" max="100">
                    </div>

                    <div class="form-group">
                        <label>浓度 (M)</label>
                        <input type="number" id="genConc" value="0.1" min="0" max="5" step="0.1">
                    </div>

                    <div class="form-group">
                        <label>生成样本数量</label>
                        <input type="number" id="numSamples" value="3" min="1" max="10">
                    </div>

                    <button class="submit-btn" id="generateBtn" onclick="generateFormula()">
                        生成配方
                    </button>
                </div>

                <div class="panel">
                    <h3 class="panel-title">生成的配方</h3>
                    <div id="generateResult">
                        <p style="color: #666; text-align: center; padding: 50px;">
                            输入目标属性后点击"生成配方"获取结果
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 词汇表 Tab -->
        <div class="tab-content" id="vocab">
            <div class="main-content">
                <div class="panel">
                    <h3 class="panel-title">可用溶剂列表</h3>
                    <div id="solventsList2" class="vocab-grid"></div>
                </div>
                <div class="panel">
                    <h3 class="panel-title">可用盐列表</h3>
                    <div id="saltsList2" class="vocab-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p class="loading-text" id="loadingText">处理中...</p>
        </div>
    </div>

    <footer>
        <p>Bamboo-Mixer | <a href="https://huggingface.co/ByteDance-Seed/bamboo_mixer" target="_blank">HuggingFace</a> | Nature Machine Intelligence 2026</p>
    </footer>

    <script>
        // API 配置
        const API_BASE = 'http://localhost:8003';

        // 全局变量
        let solventsData = [];
        let saltsData = [];

        // Tab 切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // 检查 API 状态
        async function checkApiStatus() {
            const statusEl = document.getElementById('apiStatus');
            const statusText = document.getElementById('statusText');

            try {
                const response = await fetch(`${API_BASE}/health`, { mode: 'cors' });
                if (response.ok) {
                    const data = await response.json();
                    statusEl.className = 'status-item ' + (data.models_loaded ? 'ready' : 'loading');
                    statusText.textContent = data.models_loaded ? 'API 就绪' : 'API 已连接，模型加载中...';

                    if (data.models_loaded) {
                        loadVocabularies();
                    }
                } else {
                    throw new Error('API 错误');
                }
            } catch (e) {
                statusEl.className = 'status-item error';
                statusText.textContent = 'API 未连接，请启动服务';
            }
        }

        // 加载词汇表
        async function loadVocabularies() {
            try {
                const [solvRes, saltRes] = await Promise.all([
                    fetch(`${API_BASE}/list/solvents`),
                    fetch(`${API_BASE}/list/salts`)
                ]);

                if (solvRes.ok && saltRes.ok) {
                    const solvData = await solvRes.json();
                    const saltData = await saltRes.json();

                    solventsData = solvData.solvents;
                    saltsData = saltData.salts;

                    // 更新词汇表页面
                    updateVocabList('solventsList2', solventsData);
                    updateVocabList('saltsList2', saltsData);

                    // 初始化默认溶剂
                    if (solventsData.length > 0 && document.getElementById('solventsList').children.length === 0) {
                        addSolvent('EC', 0.3);
                        addSolvent('PC', 0.3);
                        addSolvent('DMC', 0.3);
                    }

                    if (saltsData.length > 0 && document.getElementById('saltsList').children.length === 0) {
                        addSalt('LiPF6', 0.1);
                    }
                }
            } catch (e) {
                console.error('加载词汇表失败:', e);
            }
        }

        // 更新词汇表显示
        function updateVocabList(elementId, items) {
            const container = document.getElementById(elementId);
            container.innerHTML = items.map(item => `
                <div class="vocab-item">
                    <div class="vocab-name">${item.name}</div>
                    <div style="color: #888; font-size: 0.75rem;">${item.smiles.substring(0, 15)}...</div>
                </div>
            `).join('');
        }

        // 创建下拉选项
        function createSelectOptions(items, selectedName = '') {
            return items.map(item => {
                const name = typeof item === 'string' ? item : item.name;
                return `<option value="${name}" ${name === selectedName ? 'selected' : ''}>${name}</option>`;
            }).join('');
        }

        // 添加溶剂
        function addSolvent(name = '', ratio = '') {
            const list = document.getElementById('solventsList');
            const div = document.createElement('div');
            div.className = 'component-item';
            div.innerHTML = `
                <select class="solv-select">
                    ${createSelectOptions(solventsData, name)}
                </select>
                <input type="number" class="solv-ratio" placeholder="比例" value="${ratio}" min="0" max="1" step="0.01">
                <button class="remove-btn" onclick="removeComponent(this, 'solventsList')">×</button>
            `;
            list.appendChild(div);
        }

        // 添加盐
        function addSalt(name = '', ratio = '') {
            const list = document.getElementById('saltsList');
            const div = document.createElement('div');
            div.className = 'component-item';
            div.innerHTML = `
                <select class="salt-select">
                    ${createSelectOptions(saltsData, name)}
                </select>
                <input type="number" class="salt-ratio" placeholder="比例" value="${ratio}" min="0" max="1" step="0.01">
                <button class="remove-btn" onclick="removeComponent(this, 'saltsList')">×</button>
            `;
            list.appendChild(div);
        }

        // 移除组分
        function removeComponent(btn) {
            btn.parentElement.remove();
        }

        // 加载预设配方
        function loadPreset(preset) {
            const presets = {
                standard: {
                    solvents: [['EC', 0.3], ['PC', 0.3], ['DMC', 0.3]],
                    salts: [['LiPF6', 0.1]]
                },
                highconc: {
                    solvents: [['EC', 0.4], ['DMC', 0.6]],
                    salts: [['LiPF6', 1.5]]
                },
                lp30: {
                    solvents: [['EC', 0.3], ['DMC', 0.7]],
                    salts: [['LiPF6', 0.1]]
                }
            };

            const p = presets[preset];
            if (!p) return;

            // 清空并重新添加
            document.getElementById('solventsList').innerHTML = '';
            document.getElementById('saltsList').innerHTML = '';

            p.solvents.forEach(([name, ratio]) => addSolvent(name, ratio));
            p.salts.forEach(([name, ratio]) => addSalt(name, ratio));
        }

        // 收集表单数据
        function collectFormData() {
            const solvents = [];
            document.querySelectorAll('#solventsList .component-item').forEach(item => {
                const name = item.querySelector('.solv-select').value;
                const ratio = parseFloat(item.querySelector('.solv-ratio').value) || 0;
                if (name && ratio > 0) {
                    solvents.push({ name, molar_ratio: ratio });
                }
            });

            const salts = [];
            document.querySelectorAll('#saltsList .component-item').forEach(item => {
                const name = item.querySelector('.salt-select').value;
                const ratio = parseFloat(item.querySelector('.salt-ratio').value) || 0;
                if (name && ratio > 0) {
                    salts.push({ name, molar_ratio: ratio });
                }
            });

            return {
                solvents,
                salts,
                temperature: parseFloat(document.getElementById('temp').value) || 25,
                concentration: parseFloat(document.getElementById('conc').value) || 1.0
            };
        }

        // 显示 Loading
        function showLoading(text = '处理中...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('show');
        }

        // 隐藏 Loading
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // 预测配方
        async function predictFormula() {
            const data = collectFormData();

            if (data.solvents.length === 0 || data.salts.length === 0) {
                alert('请至少添加一种溶剂和一种盐');
                return;
            }

            const btn = document.getElementById('predictBtn');
            btn.disabled = true;
            showLoading('预测中...');

            try {
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    const pred = result.prediction;
                    const inp = result.input;
                    document.getElementById('predictResult').innerHTML = `
                        <div class="result-card">
                            <h4>预测结果</h4>
                            <div class="result-stats">
                                <div class="stat-item">
                                    <div class="stat-value">${pred.conductivity.toFixed(2)}</div>
                                    <div class="stat-label">电导率 (mS/cm)</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">${pred.anion_ratio.toFixed(4)}</div>
                                    <div class="stat-label">阴离子比</div>
                                </div>
                            </div>
                            <div class="formula-detail">
                                <h5>配方组成</h5>
                                ${inp.solvents.map(s =>
                                    `<div class="formula-item">
                                        <span class="name">${s.name}</span>
                                        <span class="ratio">${s.molar_ratio}</span>
                                    </div>`
                                ).join('')}
                                ${inp.salts.map(s =>
                                    `<div class="formula-item">
                                        <span class="name">${s.name}</span>
                                        <span class="ratio">${s.molar_ratio}</span>
                                    </div>`
                                ).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('predictResult').innerHTML = `
                        <div style="color: #ff4757; padding: 20px; text-align: center;">
                            预测失败: ${result.detail || '未知错误'}
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('predictResult').innerHTML = `
                    <div style="color: #ff4757; padding: 20px; text-align: center;">
                        请求失败: ${e.message}<br>
                        <small>请确保 API 服务已启动 (python api_service.py)</small>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                hideLoading();
            }
        }

        // 生成配方
        async function generateFormula() {
            const data = {
                target_conductivity: parseFloat(document.getElementById('targetCond').value) || 10,
                target_anion_ratio: parseFloat(document.getElementById('targetAnion').value) || 0.3,
                temperature: parseFloat(document.getElementById('genTemp').value) || 25,
                concentration: parseFloat(document.getElementById('genConc').value) || 0.1,
                num_samples: parseInt(document.getElementById('numSamples').value) || 1
            };

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            showLoading('生成中...');

            try {
                const response = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    let html = '';
                    result.results.forEach((item, idx) => {
                        html += `
                            <div class="result-card">
                                <h4>配方 #${idx + 1}</h4>
                                <div style="margin-bottom: 10px; color: #888; font-size: 0.85rem;">
                                    目标: 电导率=${item.target_conductivity}, 阴离子比=${item.target_anion_ratio}
                                </div>
                                <div class="formula-detail">
                                    <h5>溶剂</h5>
                                    ${item.solvents.map(s =>
                                        `<div class="formula-item">
                                            <span class="name">${s.name}</span>
                                            <span class="ratio">${(s.probability || 0).toFixed(2)}</span>
                                        </div>`
                                    ).join('') || '<div style="color: #888;">无</div>'}
                                    <h5>盐</h5>
                                    ${item.salt ? `<div class="formula-item">
                                            <span class="name">${item.salt.name}</span>
                                            <span class="ratio">${(item.salt.probability || 0).toFixed(2)}</span>
                                        </div>` : '<div style="color: #888;">无</div>'}
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('generateResult').innerHTML = html;
                } else {
                    document.getElementById('generateResult').innerHTML = `
                        <div style="color: #ff4757; padding: 20px; text-align: center;">
                            生成失败: ${result.detail || '未知错误'}
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('generateResult').innerHTML = `
                    <div style="color: #ff4757; padding: 20px; text-align: center;">
                        请求失败: ${e.message}<br>
                        <small>请确保 API 服务已启动 (python api_service.py)</small>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                hideLoading();
            }
        }

        // 页面加载完成后检查 API 状态
        window.addEventListener('load', () => {
            checkApiStatus();
            // 每 5 秒检查一次
            setInterval(checkApiStatus, 5000);
        });
    </script>
</body>
</html>
